name: Fetch MFL SFB16 Draft Picks

on:
  schedule:
    # Every 15 minutes. GitHub may delay/coalesce scheduled runs under load,
    # so treat this as "roughly every 15 min," not a hard guarantee.
    - cron: '*/15 * * * *'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch MFL draft picks
        run: node fetch_mfl.js

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase origin main
          git add data/mfl_picks.json
          if ! git diff --cached --quiet; then
            git commit -m "chore: refresh MFL draft picks"
            git push origin HEAD:main
          fi
