name: Fetch Sleeper Picks

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch: {}

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run Sleeper picks crawl
        env:
          SEASON: '2026'
          # Defaults to the site's existing seed account in the script itself;
          # override here only if that ever changes.
          # SLEEPER_USER_ID: '819245060922130432'
        run: node fetch_sleeper.js

      - name: Commit updated Sleeper data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/sleeper_picks.json
          git stash push --include-untracked -m "workflow-temp" || true
          git pull --rebase origin main || (git stash pop || true && exit 1)
          git stash pop || true
          git add data/sleeper_picks.json
          if ! git diff --cached --quiet; then
            git commit -m "Update Sleeper picks [automated]"
            git push origin HEAD:main
          fi
